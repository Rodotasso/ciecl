# Workflow que regenera codemeta.json automaticamente cuando cambia
# DESCRIPTION en main, manteniendo el sync DESCRIPTION <-> codemeta.json
# sin intervencion manual.
# Documentacion: https://github.com/codemeta/codemetar
on:
  push:
    branches: [main]
    paths:
      - DESCRIPTION
  workflow_dispatch:

name: codemeta.yaml

permissions:
  contents: write

jobs:
  codemeta:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::codemetar, local::.
          needs: codemeta

      - name: Regenerate codemeta.json
        run: codemetar::write_codemeta()
        shell: Rscript {0}

      - name: Commit codemeta.json if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codemeta.json
          git diff --staged --quiet || git commit -m "ci: regenerar codemeta.json desde DESCRIPTION [skip ci]"
          git push
