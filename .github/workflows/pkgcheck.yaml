# Workflow para pkgcheck de rOpenSci.
# Corre los chequeos estadisticos/comunitarios que rOpenSci aplica
# durante la revision Software Peer Review.
# Documentacion: https://github.com/ropensci-review-tools/pkgcheck-action
#
# Inputs validos del action (verificado 2026-05-08):
#   ref, post-to-issue, issue-title, summary-only, append-to-issue
on:
  push:
    branches: [main, dev]
  pull_request:

name: pkgcheck.yaml

permissions: read-all

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ropensci-review-tools/pkgcheck-action@main
        with:
          # Desactivar post a Issues (requiere issues:write que no tenemos).
          # `summary-only: true` solo agrega al summary pero NO inhibe el POST,
          # asi que necesitamos `post-to-issue: false` explicito.
          post-to-issue: false
          summary-only: true
