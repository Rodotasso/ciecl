on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

name: test-coverage

permissions:
  contents: write
  actions: write

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
          pct <- round(covr::percent_coverage(cov))
          color <- if (pct >= 90) "brightgreen" else if (pct >= 75) "green" else if (pct >= 60) "yellow" else "red"
          json <- sprintf('{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}', pct, color)
          writeLines(json, "badges/coverage.json")
          message("Coverage: ", pct, "%")
        shell: Rscript {0}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./cobertura.xml
          retention-days: 30

      - name: Update coverage badge
        if: github.event_name == 'push'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.json
          git diff --staged --quiet || git commit -m "ci: update coverage badge [skip ci]"
          git push
